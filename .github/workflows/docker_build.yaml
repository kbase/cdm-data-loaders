# This is boilerplate for publishing a Docker image via Github Actions.

name: Docker workflows

on:
    workflow_call:

    push:
        branches: ["main"]
        # Publish semver tags as releases.
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+"
            - "[0-9]+.[0-9]+.[0-9]+"
            - "[0-9]+.[0-9]+.[0-9]+-*"
    pull_request:
        types:
            - opened
            - reopened
            - synchronize
            - ready_for_review
    release:
        types: [published]

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}
    TEST_TAG: test_container

jobs:
    build_test_push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Login to GitHub Container Registry
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Extract Docker metadata
              uses: docker/metadata-action@v5
              id: meta
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

            - name: Build test Docker image
              uses: docker/build-push-action@v6
              id: build-test-image
              with:
                  context: .
                  load: true
                  tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TEST_TAG }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Run non-spark tests on the built image
              id: run-tests-docker
              continue-on-error: true
              run: |
                  docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TEST_TAG }} test

            - name: Build and push
              uses: docker/build-push-action@v6
              id: build-push-image
              if: ${{ github.event_name == 'release' || github.event_name == 'push' }}
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  platforms: linux/amd64,linux/arm64/v8
